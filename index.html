    <style>
        :root {
            --bg-color: #f5f4ef;
            --text-color: #000000;
            --font-serif: "Playfair Display", serif;
            --font-mono: "Roboto Mono", monospace;
            --underline-color: rgba(0, 0, 0, 0.15);
            --underline-hover: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: scroll;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 60px 40px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            gap: 60px;
            margin-bottom: 40px;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 30px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .logo span {
            font-size: 24px;
        }

        nav {
            display: flex;
            gap: 32px;
        }

        nav a {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 8px;
            text-decoration-color: var(--underline-color);
            color: inherit;
            transition: text-decoration-color 0.2s ease;
        }

        nav a:hover,
        nav a.active {
            text-decoration-color: var(--underline-hover);
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .hero-text {
            max-width: 650px;
        }

        .hero-text p {
            margin-bottom: 8px;
        }

        .section-title {
            margin-bottom: 12px;
            font-weight: 500;
        }

        .service-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .service-item {
            display: flex;
            align-items: baseline;
        }

        .service-item::before {
            content: "— ";
            margin-right: 12px;
            opacity: 0.6;
        }

        .service-link {
            text-underline-offset: 4px;
            color: inherit;
            transition: text-decoration-color 0.2s ease;
        }

        footer {
            margin-top: 154px;
            font-family: var(--font-serif);
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        @media (max-width: 768px) {
            body {
                padding: 40px 20px;
            }

            header {
                flex-direction: column;
                gap: 24px;
                margin-bottom: 60px;
            }

            nav {
                width: 100%;
                justify-content: flex-start;
                gap: 20px;
            }

            footer {
                margin-top: 80px;
                font-size: 24px;
            }
        }
    </style>
</head>
